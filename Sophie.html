<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>10 заданий</title>

<style>

*{
box-sizing:border-box;
}


body{

margin:0;
background:white;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

font-family:Arial,sans-serif;

overflow:hidden;

}



.container{

display:grid;
grid-template-columns:repeat(2,120px);
gap:25px;

}



.square{

width:120px;
height:120px;

background:#e60000;

border-radius:25px;

display:flex;
justify-content:center;
align-items:center;

color:white;

font-size:40px;
font-weight:bold;

cursor:pointer;

transition:0.3s;

user-select:none;

}



.square:active{

transform:scale(0.9);

}



.gray{

background:#888;

}



.green{

background:#18a558;

transform:scale(1.1);

}




/* конфетти */


.confetti{

position:absolute;

width:12px;
height:20px;

top:-30px;

animation:fall linear forwards;

}



@keyframes fall{


to{

transform:
translateY(110vh)
rotate(720deg);

opacity:0;

}


}



</style>

</head>



<body>


<div class="container">


<div class="square" data-audio="1.mp3">1</div>
<div class="square" data-audio="2.mp3">2</div>
<div class="square" data-audio="3.mp3">3</div>
<div class="square" data-audio="4.mp3">4</div>
<div class="square" data-audio="5.mp3">5</div>
<div class="square" data-audio="6.mp3">6</div>
<div class="square" data-audio="7.mp3">7</div>
<div class="square" data-audio="8.mp3">8</div>
<div class="square" data-audio="9.mp3">9</div>
<div class="square" data-audio="10.mp3">10</div>


</div>



<script>


const squares =
document.querySelectorAll(".square");





squares.forEach((square,index)=>{


let number=index+1;



// восстановление

let saved =
localStorage.getItem("square"+number);


if(saved){

square.classList.add(saved);

}




square.onclick=function(){



// первое нажатие

if(
!square.classList.contains("gray") &&
!square.classList.contains("green")
){


square.classList.add("gray");



let audio =
new Audio(square.dataset.audio);


audio.play().catch(()=>{});


return;

}




// второе нажатие

if(
square.classList.contains("gray")
){


square.classList.remove("gray");

square.classList.add("green");



localStorage.setItem(
"square"+number,
"green"
);



// звук победы

let win =
new Audio("success.mp3");

win.play().catch(()=>{});



// запускаем конфетти

confetti();



}


});



});






function confetti(){


for(let i=0;i<150;i++){


let piece =
document.createElement("div");


piece.className="confetti";



piece.style.left =
Math.random()*100+"vw";



piece.style.background =
[
"#ff0000",
"#00aa00",
"#0066ff",
"#ffd700",
"#ff00ff",
"#00ffff"
]
[
Math.floor(
Math.random()*6
)
];



piece.style.animationDuration =
(2+Math.random()*3)+"s";



piece.style.transform =
"rotate("+Math.random()*360+"deg)";



document.body.appendChild(piece);



setTimeout(()=>{

piece.remove();

},5000);



}



}



</script>


</body>
</html>
