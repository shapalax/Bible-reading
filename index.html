<style>
  :root{
    color-scheme: light only;
    --paper:#ffffff;
    --paper-deep:#f2f2f2;
    --ink:#000000;
    --ink-soft:#444444;
    --line:#e0e0e0;
    --accent:#1a4d8f;
    --accent-deep:#0f3567;
    --check-bg:#1a7a42;
    --check-bg-deep:#125c31;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:#ffffff;color:#000000;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;}
  header{position:sticky;top:0;z-index:20;background:#ffffff;padding:18px 18px 10px;border-bottom:1px solid var(--line);}
  h1{font-family:Georgia,serif;font-weight:700;font-size:1.4rem;margin:0 0 4px;}
  .subtitle{font-size:0.9rem;color:var(--ink-soft);margin:0 0 12px;}
  .progress-wrap{display:flex;align-items:center;gap:10px;}
  .progress-track{flex:1;height:9px;border-radius:6px;background:var(--paper-deep);border:1px solid var(--line);overflow:hidden;}
  .progress-fill{height:100%;width:0%;background:var(--accent);transition:width .35s ease;}
  .progress-label{font-size:0.85rem;font-weight:700;color:var(--ink);}
  main{padding:10px 12px 60px;}
  li.row{display:flex;align-items:flex-start;gap:12px;padding:12px 8px;border-bottom:1px solid var(--line);cursor:pointer;}
  .box{width:26px;height:26px;border:2px solid var(--ink-soft);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  li.checked .box{background:var(--check-bg);border-color:var(--check-bg-deep);}
  .num{font-family:Georgia,serif;font-weight:700;color:var(--ink-soft);min-width:32px;}
  .txt{flex:1;font-size:1.02rem;line-height:1.45;}
  li.checked .txt, li.checked .num{color:#777;text-decoration:line-through;}
</style>
</head>
<body>

<header>
  <h1>План чтения Библии</h1>
  <p class="subtitle">В хронологическом порядке · 369 чтений</p>

    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 369</div>

</header>

<main>

42","Иезекиль 43-45","Иезекиль 46-48","Даниил 1-3","Даниил 4-6","Даниил 7-9","Даниил 10-12","Осия 1-14","Иоиль 1-3","Амос 1-9","Авдий 1","Иона 1-4","Михей 1-7","Наум 1-3","Аввакум 1-3","Софония 1-3","Аггей 1-2","Захария 1-7","Захария 8-14","Малахия 1-4","Матфей 1-3","Матфей 4-6","Матфей 7-9","Матфей 10-12","Матфей 13-15","Матфей 16-18","Матфей 19-21","Матфей 22-24","Матфей 25-28","Марк 1-3","Марк 4-6","Марк 7-9","Марк 10-12","Марк 13-16","Лука 1-3","Лука 4-6","Лука 7-9","Лука 10-12","Лука 13-15","Лука 16-18","Лука 19-21","Лука 22-24","Иоанн 1-3","Иоанн 4-6","Иоанн 7-9","Иоанн 10-12","Иоанн 13-15","Иоанн 16-18","Иоанн 19-21","Деяния 1-3","Деяния 4-6","Деяния 7-9","Деяния 10-12","Деяния 13-15","Деяния 16-18","Деяния 19-21","Деяния 22-24","Деяния 25-28","Римлянам 1-3","Римлянам 4-6","Римлянам 7-9","Римлянам 10-12","Римлянам 13-16","1 Коринфянам 1-3","1 Коринфянам 4-6","1 Коринфянам 7-9","1 Коринфянам 10-12","1 Коринфянам 13-16","2 Коринфянам 1-3","2 Коринфянам 4-6","2 Коринфянам 7-9","2 Коринфянам 10-13","Галатам 1-6","Ефесянам 1-6","Филиппийцам 1-4","Колоссянам 1-4","1 Фессалоникийцам 1-5","2 Фессалоникийцам 1-3","1 Тимофею 1-6","2 Тимофею 1-4","Титу 1-3","Филимону 1","Евреям 1-3","Евреям 4-6","Евреям 7-9","Евреям 10-13","Иакова 1-5","1 Петра 1-5","2 Петра 1-3","1 Иоанна 1-5","2 Иоанна 1","3 Иоанна 1","Иуда 1","Откровение 1-3","Откровение 4-6","Откровение 7-9","Откровение 10-12","Откровение 13-15","Открове��ие 16-18","Откровение 19-22"];
const OT_END_INDEX = 272;
const STORAGE_KEY = 'bible-plan-v2';

let checkedState = {};

const listEl = document.getElementById('list');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');

function buildList() {
  const frag = document.createDocumentFragment();
  const ot = document.createElement('div');
  ot.innerHTML = '<div style="text-align:center;color:#1a4d8f;font-style:italic;margin:20px 0 10px 0;">Еврейские Писания</div>';
  frag.appendChild(ot);

  READINGS.forEach((text, i) => {
    if (i === OT_END_INDEX) {
      const nt = document.createElement('div');
      nt.innerHTML = '<div style="text-align:center;color:#1a4d8f;font-style:italic;margin:20px 0 10px 0;">Христианские Греческие Писания</div>';
      frag.appendChild(nt);
    }
    const li = document.createElement('li');
    li.className = 'row';
    li.dataset.index = i;
    li.innerHTML = `
      <div class="box"></div>
      <div class="num">${i+1}</div>
      <div class="txt">${text}</div>
    `;
    li.addEventListener('click', () => toggle(i));
    frag.appendChild(li);
  });
  listEl.appendChild(frag);
}

function toggle(i) {
  checkedState[i] = !checkedState[i];
  render();
  save();
}

function render() {
  let count = 0;
  document.querySelectorAll('li.row').forEach(row => {
    const idx = parseInt(row.dataset.index);
    const checked = !!checkedState[idx];
    row.classList.toggle('checked', checked);
    if (checked) count++;
  });
  const perc = (count / READINGS.length * 100).toFixed(1);
  progressFill.style.width = perc + '%';
  progressLabel.textContent = count + ' / ' + READINGS.length;
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checkedState));
}

function load() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) checkedState = JSON.parse(saved);
  render();
}

buildList();
load();

// Register service worker for PWA support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
